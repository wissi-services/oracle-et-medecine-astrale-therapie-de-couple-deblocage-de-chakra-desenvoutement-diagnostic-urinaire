<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Boutique unique</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Times New Roman", serif;

      background-image: url("boutique.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      text-align: center;
    }

    .voile {
      min-height: 100vh;
      background: rgba(255, 220, 120, 0.12);

      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;

      padding-top: 45px;
    }

    h1 {
      font-size: 95px;
      color: #b00000;
      text-shadow:
        4px 4px 0 #ffd15c,
        8px 8px 0 #5a0000;
      margin: 0;
      font-weight: bold;
      letter-spacing: 5px;
    }

    .sous-titre {
      font-size: 38px;
      color: #8b0000;
      font-weight: bold;
      text-shadow: 2px 2px #ffd15c;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="voile">
    <h1>独一无二商店</h1>
    <div class="sous-titre">BOUTIQUE UNIQUE</div>
  </div>
</body>
</html>
