<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Accueil</title>

  <style>
    body {
      margin: 0;
      height: 100vh;

      background-image: url("bienvenue.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: "Times New Roman", serif;
      text-align: center;
    }

    .centre {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    h1 {
      font-size: 80px;
      color: yellow;
      text-shadow: 5px 5px red;
      letter-spacing: 5px;
      margin: 0;
    }

    .bouton-rouge {
      background: red;
      color: white;
      padding: 12px 28px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 22px;
      font-weight: bold;
      border: 3px solid darkred;
      box-shadow: 3px 3px 0 black;
    }

    .bouton-rouge:hover {
      background: darkred;
    }
  </style>
</head>

<body>
  <div class="centre">
    <h1>BIENVENUE</h1>

    <a class="bouton-rouge" href="#">
      trouver la vois
    </a>
  </div>
</body>
</html>
